version: '3.8'

services:
  redis:
    image: redis:alpine
    container_name: toptop_redis
    restart: unless-stopped
    ports:
      - "6379:6379"

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: toptop_backend
    restart: unless-stopped
    depends_on:
      - redis
    ports:
      - "8000:8000"
    volumes:
      - ./storage:/app/storage
      - ./backend:/app/backend
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
      - REDIS_URL=redis://redis:6379/0

  worker:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: toptop_worker
    restart: unless-stopped
    depends_on:
      - redis
      - backend
    command: celery -A backend.worker.celery_app worker --loglevel=info --concurrency=1
    volumes:
      - ./storage:/app/storage
      - ./backend:/app/backend
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
      - REDIS_URL=redis://redis:6379/0

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: toptop_frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "5173:80"   # Ánh xạ port 80 của nginx ra port 5173 của máy host để giữ nguyên URL cũ
